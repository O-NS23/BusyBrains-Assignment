
# ========================
# Application Configuration
# ========================
spring.application.name=ecommerce-backend
server.port=${PORT:8081}

# ========================
# Database - H2 In-Memory (Development)
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:shopdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ========================
# JWT Configuration
# ========================
app.jwt.secret=BusyBrainsSecretKey2024SuperLongSecureKey1234567890AbcDefGhiJklMnoPqrStu
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# ========================
# OAuth2 - Google SSO
# Replace with your actual credentials from Google Cloud Console
# https://console.cloud.google.com/apis/credentials
# ========================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ========================
# CORS
# ========================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3001}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:3001}

# ========================
# Logging
# ========================
logging.level.com.busybrains=DEBUG
logging.level.org.springframework.security=WARN

# ========================
# Swagger / OpenAPI
# ========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
