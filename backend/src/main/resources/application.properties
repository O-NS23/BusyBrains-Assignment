
# ========================
# Application Configuration
# ========================
spring.application.name=ecommerce-backend
server.port=8080

# ========================
# Database - H2 In-Memory (Development)
# ========================
spring.datasource.url=jdbc:h2:mem:shopdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ========================
# JWT Configuration
# ========================
app.jwt.secret=BusyBrainsSecretKey2024SuperLongSecureKey1234567890AbcDefGhiJklMnoPqrStu
app.jwt.expiration-ms=86400000

# ========================
# OAuth2 - Google SSO
# Replace with your actual credentials from Google Cloud Console
# https://console.cloud.google.com/apis/credentials
# ========================
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google

# ========================
# CORS
# ========================
app.cors.allowed-origins=http://localhost:3000
app.frontend.base-url=http://localhost:3000

# ========================
# Logging
# ========================
logging.level.com.busybrains=DEBUG
logging.level.org.springframework.security=WARN

# ========================
# Swagger / OpenAPI
# ========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
